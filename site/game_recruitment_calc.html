<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/css/checkbox.css">
  <title>ありリベ UR+ 募集シミュレーター</title>
</head>
<body>
  <h1>ありリベ UR+ 募集シミュレーター</h1>

  <div class="flg-checkbox-group">
    <label><input type="checkbox" id="doubleEvent">両イベント購入</label>
    <label><input type="checkbox" id="free">無料分込みの計算</label>
  </div>

  <div>
    <p>集計対象期間</p>
    <select id="period">
      <option value="1" selected>1日</option>
      <option value="7">1週間</option>
      <option value="14">2週間</option>
      <option value="21">3週間</option>
      <option value="28">4週間</option>
    </select>
  </div>

  <br>

  <div class="gift-checkbox-group">
    <label><input type="checkbox" id="100">100円ギフト</label>
    <label><input type="checkbox" id="480">480円ギフト</label>
    <label><input type="checkbox" id="1080">1080円ギフト</label>
    <label><input type="checkbox" id="1980">1980円ギフト</label>
    <label><input type="checkbox" id="4980">4980円ギフト</label>
    <label><input type="checkbox" id="9800">9800円ギフト</label>
    <label><input type="checkbox" id="s_p">進化パス</label>
    <label><input type="checkbox" id="g_p">豪華パス</label>
  </div>

  <button id="btn" onclick="calc()">Submit</button>

  <div class="calc-ans"><p></p></div>

  <a href="/">トップページに戻る</a>

  <script src="../static/js/recruitment_calc.js"></script>
</body>
</html>
